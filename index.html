<!DOCTYPE html>
<html lang="en"> <!-- ✅ Исправлено: добавлен пробел -->
<head>
  <meta charset="UTF-8"> <!-- ✅ Исправлено -->
  <!-- ✅ Разрешаем масштабирование для доступности [[1]] -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Progress Check - Module 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --success: #16a34a;
      --error: #dc2626;
      --bg-page: #f3f4f6;
      --bg-card: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      /* ✅ Добавлено: минимальный размер тач-целей [[3]] */
      --touch-min: 44px;
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-page);
      color: var(--text-main);
      margin: 0;
      /* ✅ Исправлено: добавлен пробел в padding */
      padding: 20px 15px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    
    .container {
      width: 100%;
      max-width: 600px;
      background: var(--bg-card);
      /* ✅ Исправлено: пробел в padding */
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
    }
    
    /* ✅ Mobile-first адаптивность */
    @media (max-width: 375px) {
      .container { padding: 20px 15px; border-radius: 16px; }
      h1 { font-size: 20px; }
      .btn-submit { 
        padding: 16px; 
        font-size: 16px;
        min-height: var(--touch-min); /* ✅ Мин. высота для тача */
      }
      input[type="text"] {
        min-height: var(--touch-min); /* ✅ Удобный инпут на мобильных */
      }
    }
    
    @media (min-width: 768px) {
      body { padding: 40px 20px; }
      .container { max-width: 700px; padding: 40px 35px; }
    }
    
    /* ✅ Улучшенная кнопка копирования */
    .copy-btn {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      width: 100%;
      font-size: 16px;
      min-height: var(--touch-min); /* ✅ Доступность */
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:active { background: #d97706; }
    .copy-btn:disabled { background: #d1d5db; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <!-- ... контент формы ... -->
    
    <button type="button" id="submitBtn" class="btn-submit">SEND ANSWERS</button>
    <div id="status"></div>
    
    <div class="backup-section" id="backupSection">
      <p style="margin:0 0 10px; font-weight:600; color:#92400e;">⚠️ Connection Issue?</p>
      <p style="font-size:13px; margin:0 0 10px;">Copy the text below and send it to the teacher manually:</p>
      <textarea class="backup-textarea" id="backupText" readonly></textarea>
      <button class="copy-btn" id="copyBtn">📋 Copy to Clipboard</button>
    </div>
  </div>

  <script>
    (function(){
      const EMAIL = "i45771901@gmail.com";
      const FORM_URL = `https://formsubmit.co/ajax/${EMAIL}`;
      
      // ✅ Проверка поддержки современных API
      const isModernBrowser = () => {
        return !!(window.fetch && navigator.clipboard);
      };
      
      // ✅ Универсальная функция копирования
      async function copyToClipboard(text) {
        if (navigator.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (e) {
            console.warn('Clipboard API failed:', e);
          }
        }
        // Fallback
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        try {
          const success = document.execCommand('copy');
          document.body.removeChild(textarea);
          return success;
        } catch (err) {
          document.body.removeChild(textarea);
          return false;
        }
      }
      
      // ✅ Обработчик с проверкой браузера
      async function handleSend() {
        const name = document.getElementById('studentName')?.value.trim();
        if (!name) {
          alert("Please enter your name first!");
          document.getElementById('studentName')?.focus();
          return;
        }
        
        // ✅ Проверка поддержки fetch
        if (!window.fetch) {
          showStatus('error', '⚠️ Browser not supported. Use backup method.');
          document.getElementById('backupSection').style.display = 'block';
          return;
        }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Sending...';
        
        try {
          // ✅ Добавлен timeout для медленных соединений
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 15000);
          
          const response = await fetch(FORM_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({
              _subject: `New Test: ${name}`,
              _template: 'table',
              Student: name,
              // ... остальные данные
            }),
            signal: controller.signal
          });
          
          clearTimeout(timeoutId);
          
          if (!response.ok) throw new Error('Network error'); // ✅ Исправлено: new Error
          
          // ✅ Успешная отправка
          showStatus('success', `✅ Success! Email sent.`);
          btn.innerHTML = '✅ Sent';
          
        } catch (error) {
          console.error('Send error:', error);
          showStatus('error', '⚠️ Connection failed. Use backup below.');
          btn.disabled = false;
          btn.innerHTML = 'Try Again';
          showBackup();
        }
      }
      
      // ✅ Обработчик кнопки копирования
      document.getElementById('copyBtn')?.addEventListener('click', async () => {
        const backupText = document.getElementById('backupText');
        const copyBtn = document.getElementById('copyBtn');
        
        copyBtn.disabled = true;
        const success = await copyToClipboard(backupText.value);
        
        copyBtn.textContent = success ? '✅ Copied!' : '❌ Failed';
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy to Clipboard';
          copyBtn.disabled = false;
        }, 2000);
      });
      
      // Вспомогательные функции
      function showStatus(type, message) {
        const statusDiv = document.getElementById('status');
        statusDiv.className = `status-${type}`;
        statusDiv.style.display = 'block';
        statusDiv.innerHTML = message;
      }
      
      function showBackup() {
        const backupSection = document.getElementById('backupSection');
        backupSection.style.display = 'block';
        // ✅ Плавный скролл с проверкой поддержки
        if ('scrollBehavior' in document.documentElement.style) {
          backupSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else {
          backupSection.scrollIntoView();
        }
      }
      
      // ✅ Инициализация с проверкой
      document.getElementById('submitBtn')?.addEventListener('click', handleSend);
      
      // ✅ Предварительная проверка браузера
      if (!isModernBrowser()) {
        console.warn('Limited browser support detected');
        document.getElementById('backupSection').style.display = 'block';
      }
    })();
  </script>
</body>
</html>
